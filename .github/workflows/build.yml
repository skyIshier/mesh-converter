name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses-dev libffi-dev libssl-dev wget
          pip install --upgrade pip
          pip install buildozer cython
          pip install --prefer-binary --no-cache-dir appdirs colorama jinja2 sh build toml packaging setuptools

      - name: Set up Android SDK and NDK
        run: |
          # 设置系统预装的 Android SDK 路径
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          # 手动下载 NDK r25c (对应版本 25.2.9519653)
          NDK_VERSION="r25c"
          NDK_ZIP="android-ndk-${NDK_VERSION}-linux.zip"
          NDK_URL="https://dl.google.com/android/repository/$NDK_ZIP"
          NDK_DIR="/home/runner/android-ndk-${NDK_VERSION}"
          if [ ! -d "$NDK_DIR" ]; then
            echo "Downloading NDK ${NDK_VERSION}..."
            wget -q --show-progress "$NDK_URL" -O "$NDK_ZIP"
            echo "Extracting NDK..."
            unzip -q "$NDK_ZIP" -d /home/runner/
            # 确保目录名称正确（解压后目录名可能是 android-ndk-r25c）
            if [ ! -d "$NDK_DIR" ] && [ -d "/home/runner/android-ndk-${NDK_VERSION}" ]; then
              mv "/home/runner/android-ndk-${NDK_VERSION}" "$NDK_DIR"
            fi
          fi
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$NDK_DIR" >> $GITHUB_ENV
          echo "NDK installed at: $NDK_DIR"
          ls -la $NDK_DIR

      - name: Build with buildozer
        env:
          PYTHONUNBUFFERED: 1
        run: |
          set -x
          # 清理 buildozer 缓存，避免干扰
          rm -rf /home/runner/.buildozer
          # 环境变量已通过 $GITHUB_ENV 设置，直接运行
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
