name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf automake libtool pkg-config zlib1g-dev libncurses-dev libffi-dev libssl-dev wget \
            autoconf-archive libtool-bin gettext
          pip install --upgrade pip
          pip install buildozer cython
          pip install --prefer-binary --no-cache-dir appdirs colorama jinja2 sh build toml packaging setuptools

      - name: Set up Android SDK and NDK
        run: |
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          # 下载 NDK r26c
          NDK_VERSION="r26c"
          NDK_ZIP="android-ndk-${NDK_VERSION}-linux.zip"
          NDK_URL="https://dl.google.com/android/repository/$NDK_ZIP"
          NDK_DIR="/home/runner/android-ndk-${NDK_VERSION}"
          if [ ! -d "$NDK_DIR" ]; then
            echo "Downloading NDK ${NDK_VERSION}..."
            wget -q --show-progress "$NDK_URL" -O "$NDK_ZIP"
            echo "Extracting NDK..."
            unzip -q "$NDK_ZIP" -d /home/runner/
            if [ ! -d "$NDK_DIR" ] && [ -d "/home/runner/android-ndk-${NDK_VERSION}" ]; then
              mv "/home/runner/android-ndk-${NDK_VERSION}" "$NDK_DIR"
            fi
          fi
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$NDK_DIR" >> $GITHUB_ENV
          ls -la $NDK_DIR
          mkdir -p /usr/local/lib/android/sdk/tools/bin
          ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager /usr/local/lib/android/sdk/tools/bin/sdkmanager

      - name: Build with buildozer
        env:
          PYTHONUNBUFFERED: 1
        run: |
          set -x
          rm -rf /home/runner/.buildozer
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_NDK_HOME=/home/runner/android-ndk-r26c
          export ANDROID_NDK_ROOT=/home/runner/android-ndk-r26c
          export ANDROIDNDK=/home/runner/android-ndk-r26c
          export ACLOCAL_PATH="/usr/share/aclocal:$ACLOCAL_PATH"
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
