name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses-dev libffi-dev libssl-dev wget
          pip install --upgrade pip
          pip install buildozer cython
          pip install --prefer-binary --no-cache-dir appdirs colorama jinja2 sh build toml packaging setuptools

      - name: Manually download Android NDK 25.2.9519653
  run: |
    mkdir -p /home/runner/.buildozer/android/platform
    cd /home/runner/.buildozer/android/platform
    NDK_FILE="android-ndk-r25c-linux.zip"
    if [ ! -f "$NDK_FILE" ]; then
      echo "Downloading NDK 25.2.9519653 (r25c)..."
      wget -c "https://dl.google.com/android/repository/$NDK_FILE"
    else
      echo "NDK already downloaded."
    fi
    ls -lh "$NDK_FILE"

      - name: Build with buildozer
        env:
          PYTHONUNBUFFERED: 1
        run: |
          set -x
          # 可选：清除缓存，确保从头构建（会重新下载 SDK/NDK，耗时较长）
          # rm -rf .buildozer
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
