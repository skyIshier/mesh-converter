name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses-dev libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython
          pip install --prefer-binary --no-cache-dir appdirs colorama jinja2 sh build toml packaging setuptools

      - name: Set up Android SDK environment (use pre-installed)
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          NDK_PATH=$(ls -d /usr/local/lib/android/sdk/ndk/25* | head -1)
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "Using NDK at: $NDK_PATH"
          ls -la $ANDROID_HOME
          ls -la $NDK_PATH

      - name: Build with buildozer
        env:
          PYTHONUNBUFFERED: 1
        run: |
          set -x
          rm -rf /home/runner/.buildozer
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          NDK25_PATH=$(ls -d /usr/local/lib/android/sdk/ndk/25* | head -1)
          if [ -z "$NDK25_PATH" ]; then
              echo "Error: NDK 25 not found!"
              exit 1
          fi
          export ANDROID_NDK_HOME=$NDK25_PATH
          export ANDROID_NDK_ROOT=$NDK25_PATH
          echo "Using NDK: $NDK25_PATH"
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
